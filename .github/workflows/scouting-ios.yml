name: Scouting — iOS Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'scouting/**'

jobs:
  build-ios:
    name: iOS App Build
    runs-on: macos-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: scouting

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - name: Generate iOS app icons
        run: flutter pub run flutter_launcher_icons

      - run: pod repo update
        working-directory: scouting/ios

      - run: flutter build ios --release --no-codesign

      - run: mkdir Payload
        working-directory: scouting/build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: scouting/build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 "ScoutOps Scanner v1.3.3.ipa" Payload
        working-directory: scouting/build/ios/iphoneos

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "scouting/build/ios/iphoneos/ScoutOps Scanner v1.3.3.ipa"
          tag: scouting-ios-v1.3.3
          overwrite: true
          body: "ScoutOps Scanner iOS v1.3.3"
